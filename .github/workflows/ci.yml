name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: renewal_radar_test
        ports:
          - 5432:5432
        # Wait for Postgres to be ready before running the tests
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # No explicit `version:` — pnpm/action-setup@v4 errors when both an
        # action input AND package.json `packageManager` are set
        # (ERR_PNPM_BAD_PM_VERSION). Reading from `packageManager` is the
        # recommended pattern: one source of truth, exact-version pinned with
        # both local dev and CI.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare test env
        run: |
          echo "DATABASE_URL_TEST=postgresql://postgres:postgres@localhost:5432/renewal_radar_test" >> .env.test
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/renewal_radar_test" >> .env.test
          echo "DEMO_MODE=false" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Apply migrations to test DB
        run: pnpm db:test:migrate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      # AI quality regression gate (deterministic — no model server needed):
      # test:ci above already runs the eval-logic math, the behavioral red-team
      # (#7), the output-contract, the agent boundary, the budget enforcement,
      # and #11 (AI-off fails). This adds the moat-compounding proof (#9) end to
      # end. The LIVE-model numbers (#1–6, #8, #10) are gated by `pnpm ai:review`
      # pre-release (a model server isn't available in CI).
      - name: AI moat compounding proof (#9)
        run: pnpm ai:compounding

      - name: AI moat cross-account uplift proof (D3)
        run: pnpm ai:uplift

      - name: Build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
          CLERK_SECRET_KEY: sk_test_placeholder
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/renewal_radar_test
        run: pnpm build
